version: "3.8"

services:
  truckapi:
    # Keep exactly one instance; do not scale this service.
    container_name: truckapi
    image: truckapi-final
    build: .
    ports:
      - "8081:8081"
    environment:
      SERVER_LISTEN_ADDR: ":8081"
      ENABLE_LOADER_POST: "true"
      ENABLE_UI_FEED: "false"
      LOADER_LOG_SUCCESS_BODY: "true"
    volumes:
      - ./public:/app/public
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
